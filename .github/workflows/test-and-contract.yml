name: Test and Contract Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-contract:
    name: Unit tests + API contract drift gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run

      - name: Lint MCP doc vocabulary
        run: python scripts/lint_mcp_doc_vocabulary.py --error

      - name: Install gallery MCP server dependencies
        run: npm ci --prefix mcp-server

      - name: Build gallery MCP server
        run: npm run build --prefix mcp-server

      - name: Gallery MCP unit tests
        run: npm run test:unit --prefix mcp-server

      - name: Check renderer/electron type sync
        run: npm run check:type-sync


      - name: Check docs guides index completeness (non-blocking)
        id: docs_guides_index
        continue-on-error: true
        run: node scripts/check-guides-index.mjs

      - name: Docs guides index warning
        if: steps.docs_guides_index.outcome == 'failure'
        run: |
          echo "::warning::docs/guides/README.md is out of sync with docs/guides/*.md. Run 'node scripts/check-guides-index.mjs' and update the index links."

      - name: Setup Python for OKF docs lint
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML for OKF lint
        run: python -m pip install pyyaml

      - name: Fetch backend OKF linter
        run: git clone --depth 1 https://github.com/synthet/image-scoring-backend ../image-scoring-backend

      - name: OKF lint gallery docs
        run: >
          python ../image-scoring-backend/scripts/okf_lint.py docs
          --profile vexlum
          --bundle-name docs
          --fail-on error

      - name: Fetch backend OpenAPI snapshot source
        # Reuses the clone from "Fetch backend OKF linter" above; clone only if absent
        # (cloning into the existing path fails with exit 128).
        run: |
          if [ ! -d ../image-scoring-backend/.git ]; then
            git clone --depth 1 https://github.com/synthet/image-scoring-backend ../image-scoring-backend
          fi

      # Canonical gate: contract:check fails when generated contract files drift from source API types.
      # This blocks merges until contract artifacts are updated and committed.
      - name: Enforce API contract sync
        id: contract_check
        run: npm run contract:check

      - name: Enforce unique exported API contract interface names
        run: npm run contract:check-duplicates

      - name: Contract drift merge-block note
        if: steps.contract_check.outcome == 'failure'
        run: |
          echo "::error::Contract checks failed. Run 'npm run contract:check' and 'npm run contract:check-duplicates', then commit required fixes."

  coverage:
    name: Coverage report (non-blocking diagnostics)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error
